<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="#0a0f1a"/>
  <circle cx="256" cy="256" r="246" fill="url(#bg)" stroke="#10b981" stroke-width="4"/>

  <!-- Glow effect -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)" opacity="0.3"/>

  <!-- Signal chart line -->
  <path d="M110 330 L170 260 L210 300 L260 180 L310 250 L360 190 L400 230"
    stroke="#10b981" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Chart area fill -->
  <path d="M110 330 L170 260 L210 300 L260 180 L310 250 L360 190 L400 230 L400 380 L110 380 Z"
    fill="url(#chartFill)" opacity="0.15"/>

  <!-- Peak dot with glow -->
  <circle cx="260" cy="180" r="14" fill="#f59e0b" opacity="0.3"/>
  <circle cx="260" cy="180" r="8" fill="#f59e0b"/>

  <!-- Secondary dots -->
  <circle cx="170" cy="260" r="5" fill="#10b981"/>
  <circle cx="310" cy="250" r="5" fill="#10b981"/>
  <circle cx="360" cy="190" r="5" fill="#10b981"/>

  <!-- SINYAL text -->
  <text x="256" y="130" text-anchor="middle" fill="white" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="72" letter-spacing="8">SINYAL</text>

  <!-- Subtitle -->
  <text x="256" y="430" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-weight="600" font-size="22" letter-spacing="4">AI FUTBOL TAHMIN</text>

  <!-- Football icon -->
  <circle cx="256" cy="395" r="2" fill="#64748b"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="260" cy="240" r="200">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="chartFill" x1="256" y1="180" x2="256" y2="380">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>
